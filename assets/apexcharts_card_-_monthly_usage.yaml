type: custom:apexcharts-card
header:
  show: true
  title: Monthly Usage
graph_span: 548d
stacked: true
yaxis:
  - id: kwh
    min: 0
    max: 1700
    apex_config:
      title:
        text: kWh
      labels:
        formatter: |
          EVAL:function(value) { return value.toFixed(0); }
  - id: cost
    opposite: true
    min: 0
    apex_config:
      labels:
        formatter: |
          EVAL:function(value) { return '$' + value.toFixed(0); }
all_series_config:
  stroke_width: 2
  type: column
  show:
    legend_value: false
series:
  - entity: sensor.71_oroua_st_0000000966tr348_usage_2
    attribute: monthly_paid_usage
    name: Paid
    color: "#FEB019"
    yaxis_id: kwh
    stack_group: monthly_usage
    data_generator: |
      return entity.attributes.monthly_paid_usage ?
        Object.entries(entity.attributes.monthly_paid_usage)
        .map(([date, value]) => [Date.parse(`${date}-01T00:00:00Z`), Number(value)])
        .sort((a, b) => a[0] - b[0]) : [];
  - entity: sensor.71_oroua_st_0000000966tr348_usage_2
    attribute: monthly_free_usage
    name: Free
    color: "#008FFB"
    yaxis_id: kwh
    stack_group: monthly_usage
    data_generator: |
      return entity.attributes.monthly_free_usage ?
        Object.entries(entity.attributes.monthly_free_usage)
        .map(([date, value]) => [Date.parse(`${date}-01T00:00:00Z`), Number(value)])
        .sort((a, b) => a[0] - b[0]) : [];
  - entity: sensor.71_oroua_st_0000000966tr348_usage_2
    attribute: monthly_cost_usage
    name: Cost
    type: line
    color: "#00E396"
    yaxis_id: cost
    data_generator: |
      return entity.attributes.monthly_cost_usage ?
        Object.entries(entity.attributes.monthly_cost_usage)
        .map(([date, value]) => [Date.parse(`${date}-01T00:00:00Z`), Number(value)])
        .sort((a, b) => a[0] - b[0]) : [];
apex_config:
  chart:
    height: 220px
    type: bar
    stacked: true
  plotOptions:
    bar:
      columnWidth: 100%
  legend:
    show: true
    position: top
    horizontalAlign: center
    offsetY: 20
    markers:
      shape: square
  stroke:
    width:
      - 0
      - 0
      - 3
  markers:
    size: 0
  fill:
    type: gradient
    gradient:
      type: vertical
      shadeIntensity: 0.6
      opacityFrom: 0.25
      opacityTo: 1
      inverseColors: true
      stops:
        - 0
        - 90
        - 100
  xaxis:
    type: datetime
    labels:
      format: MMM
      rotate: -90
      rotateAlways: true
    tickAmount: 18
card_mod:
  style: |
    div#header__title {
      text-align: center !important;
      width: 100%;
    }
    .apexcharts-canvas {
      margin-top: -15px !important;
    }

    ha-card .apexcharts-legend {
      position: absolute !important;
      left: 0 !important;
      right: 0 !important;
      top: 18px !important;
      width: 100% !important;
      max-width: none !important;
      display: grid !important;
      grid-auto-flow: column !important;
      grid-auto-columns: max-content !important;
      justify-content: center !important;
      align-items: center !important;
      column-gap: 22px !important;
      overflow: visible !important;
      white-space: nowrap !important;
      z-index: 5 !important;
      font-size: 13px !important;
    }

    ha-card .apexcharts-legend-series {
      display: inline-flex !important;
      align-items: center !important;
      flex: 0 0 auto !important;
      margin: 0 !important;
      gap: 6px !important;
      white-space: nowrap !important;
    }

    ha-card .apexcharts-legend-marker {
      width: 12px !important;
      min-width: 12px !important;
      height: 12px !important;
      margin-right: 0 !important;
      margin-left: 0 !important;
      flex: 0 0 12px !important;
    }

    ha-card .apexcharts-legend-text {
      white-space: nowrap !important;
    }

    ha-card .apexcharts-legend-group-vertical {
      flex-direction: row !important;
      align-items: center !important;
      gap: 18px !important;
    }


    ha-card {
      /*
        Creates a linear gradient background from top (#383e4a) to bottom (#1e212b).
        !important is used to ensure it overrides the default background variable.
      */
      background: linear-gradient(180deg, #000000 15%, #d3d3d3 300%) !important;

      /* Optional: remove the default shadow */
      box-shadow: none;
    }

