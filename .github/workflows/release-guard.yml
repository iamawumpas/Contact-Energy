name: Release guard

on:
  push:
    tags:
      - '[0-9]+.[0-9]+.[0-9]+'
  workflow_dispatch:

jobs:
  guard:
    name: Validate release guard conditions
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # need tags and full history for accurate checks

      - name: Verify guard files and metadata
        shell: bash
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          echo "Validating guard conditions for tag: $TAG"

          # Required files
          test -f CHANGELOG.md || { echo "::error::CHANGELOG.md is missing"; exit 1; }
          test -f .allow_release || { echo "::error::.allow_release is missing"; exit 1; }
          test -f .release-owners || { echo "::error::.release-owners is missing"; exit 1; }
          test -f custom_components/contact_energy/manifest.json || { echo "::error::custom_components/contact_energy/manifest.json is missing"; exit 1; }

          # Changelog must contain an H2 section for the tag
          if ! grep -Eq "^##[[:space:]]+${TAG}\b" CHANGELOG.md; then
            echo "::error::CHANGELOG.md does not contain a '## ${TAG}' section"
            exit 1
          fi

          # .allow_release must contain only the tag string
          ALLOW=$(tr -d ' \t\r\n' < .allow_release)
          if [[ -z "$ALLOW" ]]; then
            echo "::error::.allow_release is empty"
            exit 1
          fi
          if [[ "$ALLOW" != "$TAG" ]]; then
            echo "::error::.allow_release value '$ALLOW' does not match tag '$TAG'"
            exit 1
          fi

          # .release-owners must include the GitHub actor (username) or their noreply email
          # Lines starting with # are ignored; match against words or CSV-like entries
          if ! grep -E '^[^#]' .release-owners | grep -E -i -q "(^|[,[:space:]])(${GITHUB_ACTOR}|${GITHUB_ACTOR}@users\\.noreply\\.github\\.com)([,[:space:]]|$)"; then
            echo "::error::${GITHUB_ACTOR} is not listed in .release-owners"
            echo "Contents of .release-owners:" && sed 's/^/  /' .release-owners || true
            exit 1
          fi

          # manifest.json version must equal the tag
          MANIFEST_VER=$(python3 - <<'PY'
import json
with open('custom_components/contact_energy/manifest.json') as f:
    print(json.load(f).get('version','').strip())
PY
)
          if [[ -z "$MANIFEST_VER" ]]; then
            echo "::error::manifest.json is missing a version field"
            exit 1
          fi
          if [[ "$MANIFEST_VER" != "$TAG" ]]; then
            echo "::error::manifest.json version '$MANIFEST_VER' does not match tag '$TAG'"
            exit 1
          fi

          # hacs.json version (if present) should also match the tag
          if [[ -f hacs.json ]]; then
            HACS_VER=$(python3 - <<'PY'
import json
try:
    with open('hacs.json') as f:
        print(json.load(f).get('version','').strip())
except Exception:
    print("")
PY
)
            if [[ -n "$HACS_VER" && "$HACS_VER" != "$TAG" ]]; then
              echo "::error::hacs.json version '$HACS_VER' does not match tag '$TAG'"
              exit 1
            fi
          fi

          # Optional: warn if README doesn't mention the tag
          if [[ -f README.md ]]; then
            if ! grep -q "$TAG" README.md; then
              echo "::warning::README.md does not mention tag '$TAG' (informational)"
            fi
          fi

          echo "All guard checks passed for $TAG"

      - name: Note
        if: ${{ always() }}
        run: |
          echo "This workflow only validates guard conditions. Use release.sh to perform releases with required approvals."