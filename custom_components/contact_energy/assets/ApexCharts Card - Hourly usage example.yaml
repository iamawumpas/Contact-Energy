type: custom:apexcharts-card
all_series_config:
  stroke_width: 2
  type: area
graph_span: 8d
span:
  start: day
  offset: "-9d"
update_interval: 12h
header:
  show: true
  title: Hourly Usage over the last 8 days
  show_states: false
series:
  - entity: sensor.contact_energy_chart_hourly_0000000966tr348
    name: Usage (kWh)
    show:
      legend_value: false
    data_generator: |
      const entries = Object.entries(entity.attributes.hourly_data || {})
        .filter(([dt, value]) => typeof dt === 'string' && dt.length >= 16 && !isNaN(Date.parse(dt)))
        .sort(([a], [b]) => a.localeCompare(b));
      return entries.map(([dt, value]) => [dt, Number(value)]);
  - entity: sensor.contact_energy_chart_hourly_free_0000000966tr348
    name: Free Usage (kWh)
    show:
      legend_value: false
    data_generator: |
      const entries = Object.entries(entity.attributes.hourly_free_data || {})
        .filter(([dt, value]) => typeof dt === 'string' && dt.length >= 16 && !isNaN(Date.parse(dt)))
        .sort(([a], [b]) => a.localeCompare(b));
      return entries.map(([dt, value]) => [dt, Number(value)]);
apex_config:
  chart:
    height: 200px
  legend:
    show: true
    position: top
    horizontalAlign: center
    offsetY: 20
  fill:
    type: gradient
    gradient:
      type: vertical
      shadeIntensity: 0.6
      opacityFrom: 0.25
      opacityTo: 1
      inverseColors: true
      stops:
        - 0
        - 99
        - 100
  yaxis:
    min: 0
    title:
      text: kwh
  xaxis:
    labels:
      datetimeUTC: false
      format: dd MMM
    type: datetime
    tickAmount: 8
    tickPlacement: "on"
card_mod:
  style: >
    /* FIX 1: Center the Title */

    div#header__title {
      text-align: center !important;
      width: 100%;
    }

    /* FIX 2: Reduce space between legend and chart (Targeting the internal
    components) */

    .apexcharts-legend {
      margin-top: -10px !important; 
      padding-top: 0px !important;
    }

    .apexcharts-canvas {
      margin-top: -15px !important; 
    } 

    /* RESPONSIVE FIX: Center X-Axis Day Labels */ .apexcharts-xaxis-texts-g
    text {
      text-anchor: middle !important; 
      transform: translateX(6.25%) !important; 
      
      /* NEW FIX: Override the default bolding for month boundaries */
      font-weight: normal !important;
    }
