type: custom:apexcharts-card
all_series_config:
  stroke_width: 2
  type: column
update_interval: 6h
header:
  show: true
  title: Daily Usage over the last Month
  show_states: false
graph_span: 35d
now:
  show: false
  label: Now
section_mode: false
apex_config:
  chart:
    height: 200px
    type: bar
    stacked: true
    parentHeightOffset: 35
    padding:
      left: 0
      right: 0
      top: 10
      bottom: 0
  fill:
    type: gradient
    gradient:
      type: vertical
      shadeIntensity: 0.6
      opacityFrom: 0.25
      opacityTo: 1
      inverseColors: true
      stops:
        - 0
        - 90
        - 100
  plotOptions:
    bar:
      columnWidth: 100%
  legend:
    show: true
    position: top
    horizontalAlign: center
    offsetY: 20
  xaxis:
    type: datetime
    tickPlacement: on
    labels:
      format: dd MMM
      datetimeUTC: false
      show: true
      rotate: -90
      rotateAlways: true
      hideOverlappingLabels: true
      showDuplicates: false
  yaxis:
    min: 0
    max: 70
    title:
      text: kWh
series:
  - entity: sensor.contact_energy_chart_daily_0000000966tr348
    name: Paid Usage (kWh)
    show:
      legend_value: false
    data_generator: |
      const rawData = entity.attributes.daily_data || {};
      const entries = Object.entries(rawData)
        .sort(([dateA], [dateB]) => new Date(dateA).getTime() - new Date(dateB).getTime());
        
      const dataWithoutOldest = entries.slice(1);
        
      return dataWithoutOldest.map(([dateStr, deltaValue]) => {
        // Parse the date and set to start of day (00:00:00) to avoid date shifting
        const date = new Date(dateStr);
        date.setUTCHours(0, 0, 0, 0);
        return [date.getTime(), parseFloat(deltaValue.toFixed(1))];
      });
  - entity: sensor.contact_energy_chart_daily_free_0000000966tr348
    name: Free Usage (kWh)
    show:
      legend_value: false
    data_generator: |
      const dailyFreeAttr = entity.attributes.daily_free_data || entity.attributes.daily_data;
      const rawData = dailyFreeAttr || {};

      const entries = Object.entries(rawData)
        .sort(([dateA], [dateB]) => new Date(dateA).getTime() - new Date(dateB).getTime());
        
      const dataWithoutOldest = entries.slice(1);

      return dataWithoutOldest.map(([dateStr, deltaValue]) => {
        // Parse the date and set to start of day (00:00:00) to avoid date shifting
        const date = new Date(dateStr);
        date.setUTCHours(0, 0, 0, 0);
        return [date.getTime(), parseFloat(deltaValue.toFixed(1))];
      });
card_mod:
  style: |
    .apexcharts-xaxis-label {
      font-size: 10px !important; 
    }
    div#header__title {
      text-align: center !important;
      width: 100%;
    }
    .apexcharts-legend {
      margin-top: -10px !important;    
      padding-top: 0px !important;
    }
    .apexcharts-canvas {
      margin-top: -15px !important;    
    }
    ha-card {
      background: linear-gradient(180deg, #000000 15%, #d3d3d3 300%) !important;
      box-shadow: none;
    }
